name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  application:
    name: Application
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install locked dependencies
        run: npm ci

      - name: Audit high-severity dependencies
        run: npm audit --audit-level=high

      - name: Lint application
        run: npm run lint

      - name: Build application
        run: npm run build

  database:
    name: Database and RLS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install locked dependencies
        run: npm ci

      - name: Start local Supabase
        run: npm run db:start

      - name: Rebuild database from migrations
        run: npm run db:reset

      - name: Run database and RLS tests
        run: npm run db:test

      - name: Lint database schemas
        run: npm run db:lint

      - name: Stop local Supabase
        if: always()
        run: npm run db:stop
